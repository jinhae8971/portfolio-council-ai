version: '3.8'

services:
  # 포트폴리오 분석 실행
  analyze:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./docs/data:/app/docs/data
    command: ["--portfolio", "data/portfolio.json"]

  # 일일 데이터 수집만
  fetch-data:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    entrypoint: ["python", "-c"]
    command: |
      import json, sys; sys.path.insert(0,'.')
      from src.infrastructure.data.market_fetcher import MarketDataFetcher
      from src.infrastructure.data.macro_fetcher import FREDMacroFetcher
      from src.infrastructure.data.crypto_fetcher import CoinGeckoCryptoFetcher
      from pathlib import Path; from datetime import datetime
      p=json.loads(Path('data/portfolio.json').read_text())
      tickers=[h['ticker'] for h in p.get('holdings',[]) if h.get('market')!='Crypto']
      crypto=[h['ticker'] for h in p.get('holdings',[]) if h.get('market')=='Crypto']
      data={'collected_at':datetime.now().isoformat()}
      if tickers: data['stocks']=MarketDataFetcher().fetch(tickers).get('stocks',{})
      data['macro']=FREDMacroFetcher().fetch()
      if crypto: data['crypto']=CoinGeckoCryptoFetcher().fetch(crypto)
      Path('data/cache').mkdir(parents=True,exist_ok=True)
      Path('data/cache/latest_market_data.json').write_text(json.dumps(data,ensure_ascii=False,indent=2,default=str))
      print(f'Data collected')

  # 적중률 계산
  accuracy:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./docs/data:/app/docs/data
    entrypoint: ["python", "scripts/calculate_accuracy.py"]
    command: ["--days", "7"]

  # 프롬프트 A/B 테스트
  ab-test:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    entrypoint: ["python", "scripts/prompt_ab_test.py"]
    command: ["--agent", "quant", "--rounds", "3"]
