<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Status — Portfolio Council AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f9fb;--card:#fff;--card2:#f1f5f9;--border:#e5e7eb;--text:#1e293b;--muted:#94a3b8;--accent:#4f6ef7;--green:#059669;--yellow:#d97706;--orange:#ea580c;--red:#dc2626;--blue:#4f6ef7;--purple:#a855f7;--cyan:#06b6d4}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:13px}
.container{max-width:1100px;margin:0 auto;padding:20px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:24px 0;border-bottom:1px solid var(--border);margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.3rem;font-weight:700;color:var(--text)}
.header h1 span{color:var(--accent)}
.header-links{display:flex;gap:8px;font-size:11px}
.header-links a{color:var(--accent);text-decoration:none;padding:3px 8px;border:1px solid var(--border)}
.header-links a:hover{border-color:var(--accent)}

/* Version badge */
.version{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:white;padding:3px 10px;border-radius:0;font-size:0.7rem;font-weight:700}

/* Stage tracker */
.stages{display:flex;gap:0;margin-bottom:32px;overflow-x:auto}
.stage{flex:1;min-width:180px;padding:16px;border:1px solid var(--border);position:relative}
.stage:first-child{border-radius:0 0 0 10px}
.stage:last-child{border-radius:0 10px 10px 0}
.stage.active{background:var(--card2);border-color:var(--accent)}
.stage.completed{background:linear-gradient(135deg,#22c55e10,#22c55e05);border-color:#22c55e44}
.stage.future{opacity:0.5}
.stage-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:4px}
.stage-name{font-weight:700;font-size:0.95rem}
.stage-status{font-size:0.75rem;margin-top:6px}
.stage-progress{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.stage-fill{height:100%;border-radius:2px;transition:width 0.5s}

/* KPI row */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:0;padding:14px;text-align:center}
.kpi-val{font-size:1.6rem;font-weight:800;margin:4px 0}
.kpi-lbl{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}

/* Section */
.section{margin-bottom:32px}
.section-hdr{font-size:1rem;font-weight:700;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Milestone table */
.milestone{background:var(--card);border:1px solid var(--border);border-radius:0;margin-bottom:12px;overflow:hidden}
.milestone-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer}
.milestone-hdr:hover{background:var(--card2)}
.milestone-name{font-weight:600;font-size:0.9rem}
.milestone-badge{padding:2px 10px;border-radius:0;font-size:0.7rem;font-weight:600}
.badge-done{background:#22c55e22;color:var(--green)}
.badge-active{background:#6366f122;color:var(--accent)}
.badge-pending{background:#7c8db522;color:var(--muted)}
.milestone-tasks{padding:0 16px 14px;display:none}
.milestone.open .milestone-tasks{display:block}
.task{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:0.85rem;border-bottom:1px solid #1a1d2e}
.task:last-child{border:none}
.task-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0}
.task-check.done{background:var(--green);border-color:var(--green);color:white}
.task-check.wip{background:var(--accent);border-color:var(--accent);color:white}
.task-label{flex:1}
.task-tag{font-size:0.65rem;padding:1px 6px;border-radius:4px;background:var(--border);color:var(--muted)}

/* Layer breakdown */
.layers{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.layer{background:var(--card);border:1px solid var(--border);border-radius:0;padding:16px}
.layer-name{font-weight:700;font-size:0.85rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.layer-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:6px 0}
.layer-fill{height:100%;border-radius:4px}
.layer-stat{font-size:0.75rem;color:var(--muted)}

/* Next steps */
.next-card{background:var(--card);border:1px solid var(--border);border-radius:0;padding:16px;margin-bottom:10px}
.next-card:hover{border-color:var(--accent)}
.next-priority{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.priority-high{color:var(--red)}
.priority-medium{color:var(--yellow)}
.priority-low{color:var(--green)}
.next-title{font-weight:600;font-size:0.95rem;margin-bottom:4px}
.next-desc{font-size:0.8rem;color:var(--muted)}
.next-impact{font-size:0.7rem;margin-top:6px;padding:4px 8px;background:var(--card2);border-radius:4px;display:inline-block}

/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:0;padding:16px}
.chart-card h3{font-size:0.85rem;font-weight:600;margin-bottom:12px}
@media(max-width:768px){.chart-row{grid-template-columns:1fr}.stages{flex-direction:column}.stage{border-radius:0!important;margin-bottom:4px}}

/* Timeline */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;padding-bottom:20px}
.tl-dot{position:absolute;left:-20px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border)}
.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px #6366f166}
.tl-date{font-size:0.7rem;color:var(--muted)}
.tl-text{font-size:0.85rem;margin-top:2px}

footer{text-align:center;padding:24px 0;border-top:1px solid var(--border);margin-top:32px;font-size:0.7rem;color:var(--muted)}
</style>
</head>
<body>

<!-- Header -->

</div>

<!-- Milestones -->
<div class="section">

</div>

<!-- Development Timeline -->
<div class="section">
  <div class="section-hdr">📅 Development Timeline</div>

</div>

<!-- Next Steps -->
<div class="section">

</div>

<footer>
  Portfolio Council AI — Development Status Dashboard<br>

</div>

    <div class="milestone-tasks">${m.tasks.map(t=>`
      <div class="task">
        <div class="task-check ${t.done?'done':m.status==='active'&&!t.done?'wip':''}">${t.done?'✓':''}</div>
        <span class="task-label">${t.text}</span>
        <span class="task-tag">${t.tag}</span>
      </div>`).join('')}
    </div>
  </div>`;
}).join('');

// Timeline
document.getElementById('timeline').innerHTML = PROJECT.timeline.map(t=>`
  <div class="tl-item">
    <div class="tl-dot ${t.done?'done':t.status==='active'?'active':''}"></div>
    <div class="tl-date">${t.date}</div>
    <div class="tl-text">${t.text}</div>
  </div>
`).join('');

// Next Steps
document.getElementById('nextSteps').innerHTML = PROJECT.nextSteps.map(n=>`
  <div class="next-card">
    <div class="next-priority priority-${n.priority}">${n.priority} priority</div>
    <div class="next-title">${n.title}</div>
    <div class="next-desc">${n.desc}</div>
    <div class="next-impact">💡 Impact: ${n.impact}</div>
  </div>
`).join('');

// Charts
const layerData = PROJECT.layers.filter(l=>l.lines>0);
new Chart(document.getElementById('layerChart'),{type:'doughnut',data:{labels:layerData.map(l=>l.name),datasets:[{data:layerData.map(l=>l.lines),backgroundColor:['#22c55e','#eab308','#3b82f6','#a855f7','#f97316','#06b6d4','#ec4899'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:10},padding:8}}}}});

const testData = [
  {name:'Consensus',count:7},{name:'DebateEngine',count:7},{name:'JSON Parser',count:5},
  {name:'Moderator',count:4},{name:'Schemas',count:5},{name:'E2E',count:4}
];
new Chart(document.getElementById('testChart'),{type:'bar',data:{labels:testData.map(t=>t.name),datasets:[{label:'Tests',data:testData.map(t=>t.count),backgroundColor:'#6366f1',borderRadius:4}]},options:{responsive:true,scales:{y:{beginAtZero:true,ticks:{color:'#94a3b8'}},x:{ticks:{color:'#94a3b8',font:{size:10}}}},plugins:{legend:{display:false}}}});
</script>
</body>
</html>
