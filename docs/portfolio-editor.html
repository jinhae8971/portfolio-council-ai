<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Editor — Portfolio Council AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#0f1117;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:12px;padding:20px}
input,select{background:#2a2d3e;border:1px solid #3a3d4e;color:#e2e8f0;border-radius:8px;padding:8px 12px;width:100%}
input:focus,select:focus{outline:none;border-color:#3b82f6}
button{cursor:pointer;transition:all 0.2s}
.btn-primary{background:#3b82f6;color:white;padding:10px 20px;border-radius:8px;border:none;font-weight:600}
.btn-primary:hover{background:#2563eb}
.btn-danger{background:#ef444422;color:#ef4444;padding:6px 12px;border-radius:6px;border:1px solid #ef444444;font-size:0.8rem}
.btn-danger:hover{background:#ef444444}
.weight-bar{height:8px;background:#2a2d3e;border-radius:4px;overflow:hidden;margin-top:4px}
.weight-fill{height:100%;background:#3b82f6;border-radius:4px;transition:width 0.3s}
</style>
</head>
<body>
<div class="max-w-3xl mx-auto p-4">
  <header class="flex justify-between items-center py-4 border-b border-gray-700 mb-6">
    <div>
      <h1 class="text-xl font-bold" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">📝 Portfolio Editor</h1>
      <a href="index.html" class="text-sm text-blue-400 hover:underline">← 대시보드로 돌아가기</a>
    </div>
  </header>

  <div class="card mb-4">
    <h2 class="font-semibold mb-3">포트폴리오 기본 정보</h2>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="text-xs text-gray-400">이름</label><input id="pName" value="my_portfolio"></div>
      <div><label class="text-xs text-gray-400">기준 통화</label>
        <select id="pCurrency"><option value="KRW">KRW</option><option value="USD">USD</option></select>
      </div>
      <div><label class="text-xs text-gray-400">현금 비중 (%)</label><input id="pCash" type="number" value="10" min="0" max="100"></div>
    </div>
  </div>

  <div class="card mb-4">
    <div class="flex justify-between items-center mb-3">
      <h2 class="font-semibold">보유 종목</h2>
      <button class="btn-primary text-sm" onclick="addHolding()">+ 종목 추가</button>
    </div>
    <div id="holdings"></div>
    <div class="mt-4 p-3 rounded-lg" style="background:#2a2d3e">
      <div class="flex justify-between text-sm">
        <span>종목 비중 합계</span>
        <span id="totalWeight" class="font-bold">0%</span>
      </div>
      <div class="weight-bar mt-2"><div id="totalBar" class="weight-fill"></div></div>
      <div class="flex justify-between text-sm mt-1">
        <span>현금 포함 합계</span>
        <span id="grandTotal" class="font-bold">0%</span>
      </div>
    </div>
  </div>

  <div class="card mb-4">
    <h2 class="font-semibold mb-3">투자 제약 조건</h2>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="text-xs text-gray-400">단일 종목 최대 (%)</label><input id="cStock" type="number" value="30"></div>
      <div><label class="text-xs text-gray-400">단일 섹터 최대 (%)</label><input id="cSector" type="number" value="50"></div>
      <div><label class="text-xs text-gray-400">크립토 최대 (%)</label><input id="cCrypto" type="number" value="15"></div>
      <div><label class="text-xs text-gray-400">최소 현금 (%)</label><input id="cCash" type="number" value="5"></div>
    </div>
  </div>

  <div class="card mb-4">
    <h2 class="font-semibold mb-3">에이전트 가중치 <span class="text-xs text-gray-400 font-normal">(각 에이전트의 투표 영향력 조정)</span></h2>
    <div class="grid grid-cols-3 gap-3" id="agentWeights"></div>
    <div class="mt-3 text-xs text-gray-500">1.0 = 기본, 1.5 = 50% 가중, 0.5 = 50% 감소, 0 = 투표 제외</div>
  </div>

  <div class="flex gap-3 mb-8">
    <button class="btn-primary flex-1" onclick="downloadJSON()">📥 portfolio.json 다운로드</button>
    <button class="btn-primary flex-1" style="background:#8b5cf6" onclick="copyJSON()">📋 JSON 복사</button>
  </div>

  <div class="text-center text-xs text-gray-500 mb-4">
    다운로드한 portfolio.json을 레포의 data/ 폴더에 커밋하면 자동으로 분석이 실행됩니다.
  </div>
</div>

<script>
let holdings=[];
const SECTORS=["Technology","Healthcare","Finance","Energy","Consumer","Industrial","Materials","Utilities","Real Estate","Communication","Crypto","Bond","Other"];
const MARKETS=["NASDAQ","NYSE","KRX","Crypto","Other"];
const AGENTS=[
  {key:"퀀트",avatar:"🔢",desc:"기술적 지표·팩터"},
  {key:"매크로",avatar:"🌍",desc:"거시경제·금리"},
  {key:"섹터",avatar:"🏭",desc:"섹터 로테이션"},
  {key:"사이클",avatar:"🔄",desc:"시장 타이밍"},
  {key:"크립토",avatar:"₿",desc:"암호화폐·DeFi"},
  {key:"가치투자자",avatar:"📚",desc:"밸류에이션"},
];
let agentWeights={};
AGENTS.forEach(a=>agentWeights[a.key]=1.0);

function renderAgentWeights(){
  document.getElementById("agentWeights").innerHTML=AGENTS.map(a=>`
    <div class="p-3 rounded-lg" style="background:#2a2d3e">
      <div class="flex items-center gap-2 mb-2">
        <span>${a.avatar}</span>
        <span class="text-sm font-semibold">${a.key}</span>
      </div>
      <div class="text-xs text-gray-400 mb-2">${a.desc}</div>
      <div class="flex items-center gap-2">
        <input type="range" min="0" max="2" step="0.1" value="${agentWeights[a.key]}"
          style="flex:1;accent-color:#6366f1"
          oninput="agentWeights['${a.key}']=+this.value;this.nextElementSibling.textContent=this.value+'x'">
        <span class="text-sm font-mono" style="width:36px;text-align:right">${agentWeights[a.key]}x</span>
      </div>
    </div>`).join('');
}

function addHolding(h){
  holdings.push(h||{ticker:"",name:"",market:"NASDAQ",weight:0,avg_price:null,sector:"Technology"});
  renderHoldings();
}

function removeHolding(i){holdings.splice(i,1);renderHoldings();}

function renderHoldings(){
  const el=document.getElementById("holdings");
  el.innerHTML=holdings.map((h,i)=>`
    <div class="grid gap-2 mb-3 p-3 rounded-lg" style="background:#2a2d3e;grid-template-columns:1fr 1fr 100px 100px 120px 100px auto">
      <input placeholder="티커" value="${h.ticker}" onchange="holdings[${i}].ticker=this.value">
      <input placeholder="종목명" value="${h.name}" onchange="holdings[${i}].name=this.value">
      <select onchange="holdings[${i}].market=this.value">${MARKETS.map(m=>`<option${m===h.market?' selected':''}>${m}</option>`).join('')}</select>
      <input type="number" placeholder="비중%" value="${h.weight||''}" min="0" max="100" onchange="holdings[${i}].weight=+this.value;updateTotals()">
      <select onchange="holdings[${i}].sector=this.value">${SECTORS.map(s=>`<option${s===h.sector?' selected':''}>${s}</option>`).join('')}</select>
      <input type="number" placeholder="평단가" value="${h.avg_price||''}" onchange="holdings[${i}].avg_price=+this.value||null">
      <button class="btn-danger" onclick="removeHolding(${i})">✕</button>
    </div>`).join('');
  updateTotals();
}

function updateTotals(){
  const sum=holdings.reduce((a,h)=>a+(h.weight||0),0);
  const cash=+(document.getElementById("pCash").value)||0;
  document.getElementById("totalWeight").textContent=sum+"%";
  document.getElementById("totalWeight").style.color=sum>100?"#ef4444":"#e2e8f0";
  document.getElementById("totalBar").style.width=Math.min(sum,100)+"%";
  document.getElementById("totalBar").style.background=sum>100?"#ef4444":"#3b82f6";
  document.getElementById("grandTotal").textContent=(sum+cash)+"%";
  document.getElementById("grandTotal").style.color=(sum+cash)>100?"#ef4444":(sum+cash)===100?"#22c55e":"#eab308";
}

function buildJSON(){
  return JSON.stringify({
    name:document.getElementById("pName").value,
    updated_at:new Date().toISOString().split("T")[0],
    base_currency:document.getElementById("pCurrency").value,
    cash_weight:+(document.getElementById("pCash").value)||0,
    holdings:holdings.filter(h=>h.ticker).map(h=>({ticker:h.ticker,name:h.name,market:h.market,weight:h.weight||0,avg_price:h.avg_price,sector:h.sector})),
    constraints:{max_single_stock_weight:+document.getElementById("cStock").value,max_sector_weight:+document.getElementById("cSector").value,max_crypto_weight:+document.getElementById("cCrypto").value,min_cash_weight:+document.getElementById("cCash").value},
    agent_weights:{...agentWeights}
  },null,2);
}

function downloadJSON(){
  const blob=new Blob([buildJSON()],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="portfolio.json";
  a.click();
}

function copyJSON(){
  navigator.clipboard.writeText(buildJSON()).then(()=>alert("JSON이 클립보드에 복사되었습니다!"));
}

// 초기 데이터 로드 시도
fetch("data/latest_analysis.json").then(r=>r.ok?r.json():null).then(data=>{
  if(data&&data.portfolio){
    const p=data.portfolio;
    document.getElementById("pName").value=p.name||"";
    document.getElementById("pCash").value=p.cash_weight||10;
    if(p.base_currency)document.getElementById("pCurrency").value=p.base_currency;
    if(p.constraints){
      document.getElementById("cStock").value=p.constraints.max_single_stock_weight||30;
      document.getElementById("cSector").value=p.constraints.max_sector_weight||50;
      document.getElementById("cCrypto").value=p.constraints.max_crypto_weight||15;
      document.getElementById("cCash").value=p.constraints.min_cash_weight||5;
    }
    holdings=(p.holdings||[]).map(h=>({...h}));
    if(p.agent_weights){
      Object.assign(agentWeights,p.agent_weights);
    }
    renderHoldings();
    renderAgentWeights();
  }else{
    // 샘플 데이터
    holdings=[
      {ticker:"005930.KS",name:"삼성전자",market:"KRX",weight:25,sector:"Technology",avg_price:67000},
      {ticker:"AAPL",name:"Apple",market:"NASDAQ",weight:15,sector:"Technology",avg_price:195.5},
    ];
    renderHoldings();
    renderAgentWeights();
  }
}).catch(()=>{addHolding();renderAgentWeights();});

document.getElementById("pCash").addEventListener("input",updateTotals);
</script>
</body>
</html>
