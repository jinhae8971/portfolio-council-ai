<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO COUNCIL AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
    <style>
        /* === BLOOMBERG TERMINAL RESET === */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; }

        body {
            font-family: Consolas, 'Courier New', 'Liberation Mono', monospace;
            background: #000000;
            color: #FFFFFF;
            font-size: 12px;
            line-height: 1.4;
            min-height: 100vh;
        }

        /* === TOP HEADER BAR === */
        .bb-header {
            background: #FF6600;
            color: #000;
            padding: 4px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .bb-header .title { font-size: 15px; letter-spacing: 2px; }
        .bb-header .meta { font-size: 11px; display: flex; gap: 16px; align-items: center; }
        .bb-consensus-badge {
            background: #000;
            color: #FF6600;
            padding: 2px 8px;
            font-size: 10px;
            letter-spacing: 1px;
        }

        /* === NAV BAR === */
        .bb-nav {
            background: #111;
            border-bottom: 1px solid #333;
            padding: 3px 12px;
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .bb-nav a {
            color: #FF6600;
            text-decoration: none;
            padding: 2px 10px;
            font-size: 11px;
            letter-spacing: 1px;
            border: 1px solid transparent;
        }
        .bb-nav a:hover { border-color: #FF6600; }
        .bb-nav a.active { background: #FF6600; color: #000; }
        .bb-nav .sep { color: #333; margin: 0 2px; }

        /* === MAIN CONTENT === */
        .bb-main { padding: 6px; }

        /* === KPI ROW === */
        .bb-kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #333;
            border: 1px solid #333;
            margin-bottom: 6px;
        }
        .bb-kpi {
            background: #000;
            padding: 8px 10px;
            text-align: center;
        }
        .bb-kpi .label {
            color: #888;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .bb-kpi .value {
            font-size: 22px;
            font-weight: bold;
            color: #FFFFFF;
        }
        .bb-kpi .sub {
            font-size: 9px;
            color: #666;
            margin-top: 1px;
        }

        /* === SPLIT PANELS === */
        .bb-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #333;
            border: 1px solid #333;
            margin-bottom: 6px;
        }
        .bb-panel {
            background: #000;
            padding: 8px;
        }
        .bb-panel-title {
            color: #FF6600;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
            margin-bottom: 6px;
        }

        /* === CHART === */
        .bb-chart-wrap {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }

        /* === TABLE === */
        .bb-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        .bb-table th {
            text-align: left;
            color: #FF6600;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 3px 6px;
            border-bottom: 1px solid #333;
            font-weight: normal;
        }
        .bb-table td {
            padding: 3px 6px;
            border-bottom: 1px solid #1a1a1a;
            color: #ccc;
        }
        .bb-table tr:hover td { background: #0a0a0a; }
        .bb-table .ticker { color: #FFFF00; font-weight: bold; }
        .bb-table .up { color: #00FF00; }
        .bb-table .down { color: #FF0000; }
        .bb-table .action-buy { color: #00FF00; }
        .bb-table .action-sell { color: #FF0000; }
        .bb-table .action-hold { color: #FFFF00; }
        .bb-table .action-reduce { color: #FF6600; }
        .bb-table .action-increase { color: #00FF00; }

        /* === AGENT GRID === */
        .bb-agent-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: #333;
            border: 1px solid #333;
            margin-bottom: 6px;
        }
        .bb-agent-card {
            background: #000;
            padding: 8px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .bb-agent-card:hover { background: #0a0a0a; }
        .bb-agent-card.expanded { grid-column: span 3; }
        .bb-agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .bb-agent-name {
            color: #FF6600;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .bb-agent-avatar { font-size: 14px; }
        .bb-agent-stance {
            display: inline-block;
            padding: 1px 6px;
            font-size: 9px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .stance-overweight { background: #003300; color: #00FF00; border: 1px solid #00FF00; }
        .stance-underweight { background: #330000; color: #FF0000; border: 1px solid #FF0000; }
        .stance-neutral { background: #333300; color: #FFFF00; border: 1px solid #FFFF00; }
        .stance-hold { background: #1a1a00; color: #FFFF00; border: 1px solid #FFFF00; }
        .bb-agent-conf {
            font-size: 10px;
            color: #888;
            margin: 4px 0;
        }
        .bb-agent-conf span { color: #FFF; }
        .bb-agent-points {
            font-size: 10px;
            color: #aaa;
            line-height: 1.5;
        }
        .bb-agent-points li {
            list-style: none;
            padding-left: 10px;
            position: relative;
        }
        .bb-agent-points li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: #FF6600;
        }
        .bb-agent-detail {
            display: none;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #333;
            font-size: 11px;
            color: #999;
            line-height: 1.6;
        }
        .bb-agent-card.expanded .bb-agent-detail { display: block; }

        /* === CRITIQUE SECTION === */
        .bb-critique-section {
            border: 1px solid #333;
            margin-bottom: 6px;
        }
        .bb-critique-title {
            background: #111;
            color: #FF6600;
            font-size: 10px;
            letter-spacing: 2px;
            padding: 4px 10px;
            border-bottom: 1px solid #333;
        }
        .bb-critique-log {
            padding: 8px 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .bb-critique-entry {
            margin-bottom: 8px;
            font-size: 11px;
            line-height: 1.5;
        }
        .bb-critique-entry .prompt {
            color: #00FF00;
        }
        .bb-critique-entry .target {
            color: #FF6600;
        }
        .bb-critique-entry .text {
            color: #999;
            padding-left: 16px;
        }

        /* === RISK WARNING === */
        .bb-risk-bar {
            background: #1a0000;
            border: 1px solid #FF0000;
            padding: 6px 10px;
            margin-bottom: 6px;
        }
        .bb-risk-title {
            color: #FF0000;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .bb-risk-item {
            color: #FF6666;
            font-size: 11px;
            padding: 2px 0;
            padding-left: 14px;
            position: relative;
        }
        .bb-risk-item::before {
            content: '!';
            position: absolute;
            left: 0;
            color: #FF0000;
            font-weight: bold;
        }

        /* === KEY INSIGHTS === */
        .bb-insights {
            border: 1px solid #333;
            margin-bottom: 6px;
        }
        .bb-insights-title {
            background: #111;
            color: #FFFF00;
            font-size: 10px;
            letter-spacing: 2px;
            padding: 4px 10px;
            border-bottom: 1px solid #333;
        }
        .bb-insights-body {
            padding: 8px 10px;
        }
        .bb-insight-item {
            color: #ccc;
            font-size: 11px;
            padding: 2px 0;
            padding-left: 14px;
            position: relative;
        }
        .bb-insight-item::before {
            content: '*';
            position: absolute;
            left: 0;
            color: #FFFF00;
        }

        /* === CASH REC === */
        .bb-cash {
            border: 1px solid #333;
            margin-bottom: 6px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .bb-cash-label {
            color: #888;
            font-size: 9px;
            letter-spacing: 1px;
        }
        .bb-cash-val { font-size: 16px; font-weight: bold; }
        .bb-cash-arrow { color: #FF6600; font-size: 18px; }
        .bb-cash-reason { color: #888; font-size: 10px; flex: 1; }

        /* === DISCLAIMER === */
        .bb-disclaimer {
            color: #444;
            font-size: 9px;
            padding: 8px 10px;
            border-top: 1px solid #222;
            line-height: 1.5;
        }

        /* === CONF BAR === */
        .conf-bar {
            width: 60px;
            height: 6px;
            background: #222;
            display: inline-block;
            vertical-align: middle;
            margin-left: 4px;
        }
        .conf-bar-fill {
            height: 100%;
            background: #FF6600;
        }

        /* === STATUS LINE === */
        .bb-status {
            background: #111;
            border-top: 1px solid #333;
            padding: 2px 12px;
            font-size: 9px;
            color: #666;
            display: flex;
            justify-content: space-between;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* === LOADING === */
        .bb-loading {
            text-align: center;
            padding: 40px;
            color: #FF6600;
            font-size: 14px;
        }
        .bb-loading .blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .bb-kpi-row { grid-template-columns: repeat(2, 1fr); }
            .bb-split { grid-template-columns: 1fr; }
            .bb-agent-grid { grid-template-columns: 1fr; }
            .bb-agent-card.expanded { grid-column: span 1; }
            .bb-header { flex-direction: column; gap: 4px; text-align: center; }
            .bb-cash { flex-direction: column; gap: 6px; }
        }
        @media (max-width: 480px) {
            .bb-kpi-row { grid-template-columns: 1fr 1fr; }
            .bb-kpi .value { font-size: 16px; }
        }
    </style>
</head>

            "다음 실적 시즌(4월 말)이 시장 방향 결정적 변곡점"
        ],
        cash_recommendation: {current:10, target:18, reason:"드로다운 완충 및 조정 시 매수 여력 확보"}
    }
};

// ========== APP ==========
let analysisData = null;

async function loadData() {
    try {
        const res = await fetch('data/latest_analysis.json');
        if (!res.ok) throw new Error('No data file');
        analysisData = await res.json();
    } catch(e) {
        console.log('Using demo data:', e.message);
        analysisData = DEMO_DATA;
    }
    render();
}

function render() {
    const d = analysisData;
    document.getElementById('hdr-date').textContent = d.date;
    const ct = d.verdict.consensus_type.replace(/_/g,' ').toUpperCase();
    const badge = document.getElementById('hdr-consensus');
    badge.textContent = ct;

    const app = document.getElementById('app');
    app.innerHTML = '';

    // KPI ROW
    const totalAgents = d.debate.phase1_reports.length;
    const votes = d.verdict.stance_votes;
    const underCount = Object.values(votes).filter(v=>v==='UNDERWEIGHT').length;
    const overCount = Object.values(votes).filter(v=>v==='OVERWEIGHT').length;
    const holdCount = totalAgents - underCount - overCount;

    app.innerHTML += `
    <div class="bb-kpi-row">
        <div class="bb-kpi">
            <div class="label">CONFIDENCE</div>
            <div class="value" style="color:${d.verdict.confidence_score>=70?'#00FF00':'#FFFF00'}">${d.verdict.confidence_score}%</div>
            <div class="sub">${ct}</div>
        </div>
        <div class="bb-kpi">
            <div class="label">AGENTS</div>
            <div class="value">${totalAgents}</div>
            <div class="sub" style="color:#00FF00">OW:${overCount} <span style="color:#FF0000">UW:${underCount}</span> <span style="color:#FFFF00">H:${holdCount}</span></div>
        </div>
        <div class="bb-kpi">
            <div class="label">CASH TARGET</div>
            <div class="value" style="color:#FF6600">${d.verdict.cash_recommendation.target}%</div>
            <div class="sub">FROM ${d.verdict.cash_recommendation.current}%</div>
        </div>
        <div class="bb-kpi">
            <div class="label">CHANGES</div>
            <div class="value">${d.verdict.portfolio_changes.length}</div>
            <div class="sub">REBALANCE ACTIONS</div>
        </div>
    </div>`;

    // CASH RECOMMENDATION
    app.innerHTML += `
    <div class="bb-cash">
        <div>
            <div class="bb-cash-label">CASH ALLOCATION</div>
            <div class="bb-cash-val" style="color:#FFFF00">${d.verdict.cash_recommendation.current}%</div>
        </div>
        <div class="bb-cash-arrow">&rarr;</div>
        <div>
            <div class="bb-cash-label">TARGET</div>
            <div class="bb-cash-val" style="color:#00FF00">${d.verdict.cash_recommendation.target}%</div>
        </div>
        <div class="bb-cash-reason">${d.verdict.cash_recommendation.reason}</div>
    </div>`;

    // SPLIT: CHART + TABLE
    app.innerHTML += `
    <div class="bb-split">
        <div class="bb-panel">
            <div class="bb-panel-title">PORTFOLIO ALLOCATION</div>
            <div class="bb-chart-wrap"><canvas id="donutChart"></canvas></div>
        </div>
        <div class="bb-panel">
            <div class="bb-panel-title">REBALANCE ACTIONS</div>
            <table class="bb-table">
                <thead>
                    <tr><th>TICKER</th><th>NAME</th><th>ACTION</th><th>FROM</th><th>TO</th><th>CHG</th></tr>
                </thead>
                <tbody id="changeTable"></tbody>
            </table>
        </div>
    </div>`;

    // Fill table
    const tbody = document.getElementById('changeTable');
    d.verdict.portfolio_changes.forEach(c => {
        const chg = c.to_weight - c.from_weight;
        const chgStr = chg > 0 ? `+${chg}%` : `${chg}%`;
        const chgClass = chg > 0 ? 'up' : chg < 0 ? 'down' : '';
        const actionMap = {reduce:'action-reduce', increase:'action-increase', hold:'action-hold', buy:'action-buy', sell:'action-sell'};
        const aClass = actionMap[c.action] || '';
        tbody.innerHTML += `<tr>
            <td class="ticker">${c.ticker}</td>
            <td>${c.name}</td>
            <td class="${aClass}">${c.action.toUpperCase()}</td>
            <td>${c.from_weight}%</td>
            <td>${c.to_weight}%</td>
            <td class="${chgClass}">${chgStr}</td>
        </tr>`;
    });

    // Draw chart
    setTimeout(() => drawDonut(d), 50);

    // AGENT GRID
    let agentHtml = '<div class="bb-agent-grid" id="agentGrid">';
    d.debate.phase1_reports.forEach((a, i) => {
        const stanceClass = a.overall_stance === 'OVERWEIGHT' ? 'stance-overweight' :
                           a.overall_stance === 'UNDERWEIGHT' ? 'stance-underweight' : 'stance-neutral';
        const points = a.key_points.map(p => `<li>${p}</li>`).join('');
        agentHtml += `
        <div class="bb-agent-card" data-idx="${i}" onclick="toggleAgent(this)">
            <div class="bb-agent-header">
                <span class="bb-agent-name">${a.avatar} ${a.agent_name}</span>
                <span class="bb-agent-stance ${stanceClass}">${a.overall_stance}</span>
            </div>
            <div class="bb-agent-conf">
                CONF: <span>${a.confidence_score}%</span>
                <span class="conf-bar"><span class="conf-bar-fill" style="width:${a.confidence_score}%"></span></span>
            </div>
            <ul class="bb-agent-points">${points}</ul>
            <div class="bb-agent-detail">
                <div style="color:#FF6600;font-size:9px;margin-bottom:4px;">ROLE: ${a.role}</div>
                ${a.analysis}
            </div>
        </div>`;
    });
    agentHtml += '</div>';
    app.innerHTML += agentHtml;

    // CRITIQUES
    let critHtml = `<div class="bb-critique-section">
        <div class="bb-critique-title">CROSS-CRITIQUE LOG [PHASE 2]</div>
        <div class="bb-critique-log">`;
    d.debate.phase2_critiques.forEach(c => {
        critHtml += `<div class="bb-critique-entry">
            <span class="prompt">${c.from_agent}</span> <span style="color:#666">&rarr;</span> <span class="target">${c.to_agent}</span>
            <div class="text">${c.critique}</div>
        </div>`;
    });
    critHtml += '</div></div>';
    app.innerHTML += critHtml;

    // KEY INSIGHTS
    let insHtml = `<div class="bb-insights">
        <div class="bb-insights-title">KEY INSIGHTS</div>
        <div class="bb-insights-body">`;
    d.verdict.key_insights.forEach(k => {
        insHtml += `<div class="bb-insight-item">${k}</div>`;
    });
    insHtml += '</div></div>';
    app.innerHTML += insHtml;

    // RISK WARNINGS
    let riskHtml = `<div class="bb-risk-bar">
        <div class="bb-risk-title">&#9888; RISK WARNINGS</div>`;
    d.verdict.risk_warnings.forEach(r => {
        riskHtml += `<div class="bb-risk-item">${r}</div>`;
    });
    riskHtml += '</div>';
    app.innerHTML += riskHtml;

    // VERDICT SUMMARY
    app.innerHTML += `
    <div style="border:1px solid #333;margin-bottom:6px;padding:8px 10px;">
        <div style="color:#FF6600;font-size:10px;letter-spacing:2px;margin-bottom:4px;">VERDICT SUMMARY</div>
        <div style="color:#ccc;font-size:11px;line-height:1.6;">${d.verdict.summary}</div>
    </div>`;

    // DISCLAIMER
    app.innerHTML += `
    <div class="bb-disclaimer">
        DISCLAIMER: This analysis is generated by AI agents for informational purposes only.
        It does not constitute investment advice. Past performance does not guarantee future results.
        Always consult a qualified financial advisor before making investment decisions.
        Portfolio Council AI is not responsible for any losses incurred based on this analysis.
        &copy; ${new Date().getFullYear()} Portfolio Council AI
    </div>`;

    // Remove loading
    document.getElementById('loading')?.remove();
}

function drawDonut(d) {
    const canvas = document.getElementById('donutChart');
    if (!canvas) return;
    const labels = [...d.portfolio.holdings.map(h=>h.ticker), 'CASH'];
    const weights = [...d.portfolio.holdings.map(h=>h.weight), d.portfolio.cash_weight];
    const colors = ['#FF6600','#FFFF00','#00FF00','#FF0000','#00CCFF','#FF00FF','#FFFFFF','#888888'];

    new Chart(canvas, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: weights,
                backgroundColor: colors.slice(0, labels.length),
                borderColor: '#000',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            cutout: '55%',
            plugins: {
                legend: {
                    position: 'right',
                    labels: {
                        color: '#ccc',
                        font: { family: "Consolas, 'Courier New', monospace", size: 10 },
                        padding: 6,
                        boxWidth: 10,
                        boxHeight: 10
                    }
                },
                tooltip: {
                    backgroundColor: '#111',
                    titleColor: '#FF6600',
                    bodyColor: '#FFF',
                    borderColor: '#333',
                    borderWidth: 1,
                    titleFont: { family: "Consolas, monospace" },
                    bodyFont: { family: "Consolas, monospace" },
                    callbacks: {
                        label: ctx => ` ${ctx.label}: ${ctx.parsed}%`
                    }
                }
            }
        }
    });
}

function toggleAgent(el) {
    const grid = document.getElementById('agentGrid');
    const wasExpanded = el.classList.contains('expanded');
    grid.querySelectorAll('.bb-agent-card').forEach(c => c.classList.remove('expanded'));
    if (!wasExpanded) el.classList.add('expanded');
}

// Clock
function updateClock() {
    const now = new Date();
    const t = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    document.getElementById('status-clock').textContent = t;
    document.getElementById('hdr-time').textContent = t;
}
setInterval(updateClock, 1000);
updateClock();

// INIT
loadData();
</script>
</body>
</html>
