<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCURACY | Portfolio Council AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Consolas,'Courier New',monospace;background:#000;color:#ccc;font-size:13px;line-height:1.5}
.top-bar{background:#ff6600;color:#000;padding:4px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:12px}
.top-bar a{color:#000;text-decoration:none;margin-left:16px;font-weight:400}
.top-bar a:hover{text-decoration:underline}
.container{max-width:1000px;margin:0 auto;padding:12px}
.section{border:1px solid #333;margin-bottom:8px}
.section-hdr{background:#111;padding:6px 10px;border-bottom:1px solid #333;color:#ff6600;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.1em}
.section-body{padding:10px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.kpi{background:#0a0a0a;border:1px solid #333;padding:10px;text-align:center}
.kpi-val{font-size:22px;font-weight:700;color:#fff;margin:4px 0}
.kpi-lbl{font-size:10px;color:#666;text-transform:uppercase}
.agent-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1a1a1a}
.agent-name{width:80px;font-weight:700;font-size:12px;color:#ff6600}
.acc-bar{flex:1;height:16px;background:#111;position:relative;border:1px solid #222}
.acc-fill{height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:700;color:#000}
.acc-stat{width:50px;text-align:right;font-size:11px;color:#666}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:6px 8px;color:#666;font-size:10px;text-transform:uppercase;border-bottom:1px solid #333}
td{padding:6px 8px;border-bottom:1px solid #1a1a1a;font-size:12px}
.green{color:#00cc00}.red{color:#ff3333}.dim{color:#666}
.no-data{text-align:center;padding:40px;color:#666}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="top-bar">
  <span>PORTFOLIO COUNCIL AI — ACCURACY TRACKER</span>
  <div><a href="index.html">DASHBOARD</a><a href="portfolio-editor.html">EDITOR</a><a href="history.html">HISTORY</a><a href="dev-status.html">DEV</a></div>
</div>
<div class="container" id="app"><div class="no-data">LOADING...</div></div>

<script>
async function load(){try{const r=await fetch('./data/accuracy.json?t='+Date.now());if(r.ok)return await r.json();}catch(e){}return null;}
function ac(p){return p>=70?'#00cc00':p>=50?'#ffcc00':'#ff3333';}

function render(data){
  if(!data){document.getElementById('app').innerHTML='<div class="no-data">NO ACCURACY DATA YET<br><span class="dim">Run analyses and wait for evaluation period.</span></div>';return;}
  const o=data.overall,agents=data.by_agent||{},reports=data.by_report||[];
  let html=`
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-lbl">Overall Accuracy</div><div class="kpi-val" style="color:${o.accuracy_pct?ac(o.accuracy_pct):'#666'}">${o.accuracy_pct!==null?o.accuracy_pct+'%':'N/A'}</div></div>
    <div class="kpi"><div class="kpi-lbl">Correct</div><div class="kpi-val green">${o.correct}</div></div>
    <div class="kpi"><div class="kpi-lbl">Total Picks</div><div class="kpi-val">${o.total}</div></div>
    <div class="kpi"><div class="kpi-lbl">Eval Period</div><div class="kpi-val">${data.eval_days}d</div></div>
  </div>`;
  const names=Object.keys(agents);
  if(names.length){
    html+='<div class="section"><div class="section-hdr">Agent Accuracy</div><div class="section-body">';
    for(const n of names.sort((a,b)=>(agents[b].accuracy_pct||0)-(agents[a].accuracy_pct||0))){
      const a=agents[n],p=a.accuracy_pct||0;
      html+=`<div class="agent-row"><span class="agent-name">${n}</span><div class="acc-bar"><div class="acc-fill" style="width:${p}%;background:${ac(p)}">${p}%</div></div><span class="acc-stat">${a.correct}/${a.total}</span></div>`;
    }
    html+='</div></div>';
  }
  if(reports.length){
    html+='<div class="section"><div class="section-hdr">Detail by Report</div><div class="section-body"><table><thead><tr><th>Date</th><th>Ticker</th><th>Action</th><th>Return</th><th>Hit</th></tr></thead><tbody>';
    for(const r of reports)for(const e of r.evaluations||[])
      html+=`<tr><td>${r.report_date}</td><td style="color:#fff">${e.ticker}</td><td>${e.action}</td><td class="${e.actual_return_pct>=0?'green':'red'}">${e.actual_return_pct>0?'+':''}${e.actual_return_pct}%</td><td>${e.is_correct?'<span class="green">✓</span>':'<span class="red">✗</span>'}</td></tr>`;
    html+='</tbody></table></div></div>';
  }
  document.getElementById('app').innerHTML=html;
}
load().then(render);
</script>
</body>
</html>
