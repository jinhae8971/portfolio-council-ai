<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTORY | Portfolio Council AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Consolas,'Courier New',monospace;background:#000;color:#ccc;font-size:13px;line-height:1.5}
.top-bar{background:#ff6600;color:#000;padding:4px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:12px}
.top-bar a{color:#000;text-decoration:none;margin-left:16px;font-weight:400}
.top-bar a:hover{text-decoration:underline}
.container{max-width:1100px;margin:0 auto;padding:12px}
.section{border:1px solid #333;margin-bottom:8px}
.section-hdr{background:#111;padding:6px 10px;border-bottom:1px solid #333;color:#ff6600;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.1em}
.section-body{padding:10px}
.chart-wrap{background:#0a0a0a;padding:10px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:6px 8px;color:#666;font-size:10px;text-transform:uppercase;border-bottom:1px solid #333;font-weight:700}
td{padding:6px 8px;border-bottom:1px solid #1a1a1a;font-size:12px}
tr:hover{background:#111}
.badge{padding:1px 6px;font-size:10px;font-weight:700;border:1px solid}
.b-sc{color:#00cc00;border-color:#004400}
.b-mv{color:#ffcc00;border-color:#444400}
.b-sd{color:#ff6600;border-color:#442200}
.b-nc{color:#ff3333;border-color:#440000}
.green{color:#00cc00}.red{color:#ff3333}.yellow{color:#ffcc00}.dim{color:#666}
.conf-bar{display:inline-block;width:40px;height:4px;background:#222;vertical-align:middle;margin-left:4px}
.conf-fill{display:block;height:100%}
.stance-dots span{margin-right:2px}
@media(max-width:700px){table{font-size:11px}td,th{padding:4px}}
</style>
</head>
<body>
<div class="top-bar">
  <span>PORTFOLIO COUNCIL AI — ANALYSIS HISTORY</span>
  <div><a href="index.html">DASHBOARD</a><a href="portfolio-editor.html">EDITOR</a><a href="accuracy.html">ACCURACY</a><a href="dev-status.html">DEV</a></div>
</div>
<div class="container">
<div class="section"><div class="section-hdr">Confidence Trend</div><div class="section-body"><div class="chart-wrap"><canvas id="chart" height="100"></canvas></div></div></div>
<div class="section"><div class="section-hdr">Analysis History</div><div class="section-body" id="tbl"></div></div>
</div>

<script>
const DEMO=[
  {date:"2026-04-13",consensus:"majority_view",confidence:68,changes:3,risks:3,summary:"NVDA 비중 축소, 현금 확대, 방어적 섹터 추가",stances:{퀀트:"UNDERWEIGHT",매크로:"MAINTAIN",섹터:"UNDERWEIGHT",사이클:"UNDERWEIGHT",크립토:"MAINTAIN",가치투자자:"MAINTAIN"}},
  {date:"2026-04-06",consensus:"strong_consensus",confidence:75,changes:2,risks:2,summary:"전반적 비중 유지, 삼성전자 소폭 확대",stances:{퀀트:"MAINTAIN",매크로:"OVERWEIGHT",섹터:"MAINTAIN",사이클:"OVERWEIGHT",크립토:"MAINTAIN",가치투자자:"OVERWEIGHT"}},
  {date:"2026-03-30",consensus:"split_decision",confidence:52,changes:4,risks:4,summary:"의견 분열, 현상 유지 권고",stances:{퀀트:"OVERWEIGHT",매크로:"UNDERWEIGHT",섹터:"MAINTAIN",사이클:"UNDERWEIGHT",크립토:"OVERWEIGHT",가치투자자:"UNDERWEIGHT"}},
  {date:"2026-03-23",consensus:"majority_view",confidence:72,changes:2,risks:1,summary:"금리 인하 수혜, TLT 확대",stances:{퀀트:"OVERWEIGHT",매크로:"OVERWEIGHT",섹터:"MAINTAIN",사이클:"OVERWEIGHT",크립토:"MAINTAIN",가치투자자:"OVERWEIGHT"}},
];

async function load(){
  let h=[...DEMO];
  try{const ri=await fetch('./data/history_index.json?t='+Date.now());if(ri.ok){const d=await ri.json();if(d.reports&&d.reports.length)h=d.reports;}}catch(e){}
  try{const r=await fetch('./data/latest_analysis.json?t='+Date.now());if(r.ok){const d=await r.json();const v=d.verdict||{};if(!h.find(x=>x.date===d.date))h.unshift({date:d.date,consensus:v.consensus_type,confidence:v.confidence_score||0,changes:(v.portfolio_changes||[]).length,risks:(v.risk_warnings||[]).length,summary:v.summary||"",stances:v.stance_votes||{}});}}catch(e){}
  return h.sort((a,b)=>b.date.localeCompare(a.date));
}

function cBadge(t){const m={strong_consensus:['STRONG','b-sc'],majority_view:['MAJORITY','b-mv'],split_decision:['SPLIT','b-sd'],no_consensus:['NONE','b-nc']};const[l,c]=m[t]||['?','b-nc'];return`<span class="badge ${c}">${l}</span>`;}
function cColor(s){return s>=70?'#00cc00':s>=50?'#ffcc00':'#ff3333';}
function sIcon(s){return{STRONG_OVERWEIGHT:'▲▲',OVERWEIGHT:'▲',MAINTAIN:'—',UNDERWEIGHT:'▼',STRONG_UNDERWEIGHT:'▼▼'}[s]||'?';}
function sColor(s){return s.includes('OVER')?'#00cc00':s==='MAINTAIN'?'#ffcc00':'#ff3333';}

function render(data){
  if(data.length>1){
    new Chart(document.getElementById('chart'),{type:'line',data:{labels:data.map(h=>h.date).reverse(),datasets:[{label:'Confidence %',data:data.map(h=>h.confidence).reverse(),borderColor:'#ff6600',backgroundColor:'#ff660022',fill:true,tension:0.2,pointRadius:4,pointBackgroundColor:data.map(h=>cColor(h.confidence)).reverse()}]},options:{responsive:true,scales:{y:{beginAtZero:true,max:100,ticks:{color:'#666',font:{family:'Consolas'}},grid:{color:'#1a1a1a'}},x:{ticks:{color:'#666',font:{family:'Consolas'}},grid:{color:'#1a1a1a'}}},plugins:{legend:{labels:{color:'#666',font:{family:'Consolas'}}}}}});
  }
  let html='<table><thead><tr><th>Date</th><th>Consensus</th><th>Conf</th><th>Chg</th><th>Risk</th><th>Agents</th><th>Summary</th></tr></thead><tbody>';
  for(const r of data){
    const dots=Object.entries(r.stances||{}).map(([n,s])=>`<span title="${n}:${s}" style="color:${sColor(s)}">${sIcon(s)}</span>`).join('');
    html+=`<tr><td style="color:#fff;font-weight:700">${r.date}</td><td>${cBadge(r.consensus)}</td><td><span style="color:${cColor(r.confidence)};font-weight:700">${r.confidence}%</span><span class="conf-bar"><span class="conf-fill" style="width:${r.confidence}%;background:${cColor(r.confidence)}"></span></span></td><td>${r.changes}</td><td class="${r.risks>=3?'red':r.risks>=2?'yellow':'green'}">${r.risks}</td><td class="stance-dots">${dots}</td><td class="dim" style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.summary}">${r.summary}</td></tr>`;
  }
  html+='</tbody></table>';
  document.getElementById('tbl').innerHTML=html;
}
load().then(render);
</script>
</body>
</html>
