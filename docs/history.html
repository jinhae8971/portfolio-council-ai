<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History — Portfolio Council AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:16px}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid #2a2d3e;margin-bottom:24px;flex-wrap:wrap;gap:8px}
h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:8px;font-size:0.8rem}
.nav a{color:#3b82f6;text-decoration:none;padding:4px 10px;border:1px solid #2a2d3e;border-radius:6px}
.nav a:hover{border-color:#3b82f6}
.card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:12px;padding:20px;margin-bottom:20px}
.card h3{font-size:0.95rem;font-weight:600;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #2a2d3e}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{text-align:left;padding:10px;color:#94a3b8;border-bottom:1px solid #2a2d3e;font-weight:500;cursor:pointer}
th:hover{color:#e2e8f0}
td{padding:10px;border-bottom:1px solid #1a1d2e}
tr:hover{background:#1a1d2e88}
.badge{padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:600}
.badge-sc{background:#22c55e22;color:#22c55e}
.badge-mv{background:#eab30822;color:#eab308}
.badge-sd{background:#f9731622;color:#f97316}
.badge-nc{background:#ef444422;color:#ef4444}
.conf-mini{display:inline-block;width:40px;height:6px;background:#2a2d3e;border-radius:3px;vertical-align:middle;margin-left:4px;overflow:hidden}
.conf-mini-fill{height:100%;border-radius:3px}
.changes-count{font-weight:600}
.positive{color:#22c55e}
.negative{color:#ef4444}
.neutral{color:#eab308}
.no-data{text-align:center;padding:60px;color:#94a3b8}
.report-detail{display:none;padding:16px;background:#12141f;border-radius:8px;margin-top:8px}
.report-detail.open{display:block}
footer{text-align:center;padding:24px 0;border-top:1px solid #2a2d3e;margin-top:32px;font-size:0.7rem;color:#94a3b8}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📅 Analysis History</h1>
    <div class="nav">
      <a href="index.html">📊 Dashboard</a>
      <a href="portfolio-editor.html">📝 Editor</a>
      <a href="accuracy.html">📈 Accuracy</a>
      <a href="dev-status.html">🛠️ Dev</a>
    </div>
  </header>

  <div class="card">
    <h3>📈 확신도 추이</h3>
    <canvas id="confidenceChart" height="120"></canvas>
  </div>

  <div class="card">
    <h3>📋 분석 히스토리</h3>
    <div id="historyTable"></div>
  </div>

  <div id="reportDetail" class="report-detail"></div>
</div>

<footer>Portfolio Council AI — Analysis History</footer>

<script>
// 히스토리 데이터를 data/history/ 디렉토리의 파일 목록에서 로드
// GitHub Pages에서는 디렉토리 리스팅이 안 되므로, latest_analysis.json에서 히스토리 인덱스를 읽거나
// 별도 index 파일을 사용. 여기서는 데모 데이터 + latest_analysis.json을 결합.

const DEMO_HISTORY = [
  {date:"2026-04-13",consensus:"majority_view",confidence:68,changes:3,risks:3,summary:"NVDA 비중 축소, 현금 확대, 방어적 섹터 추가 권고",stances:{퀀트:"UNDERWEIGHT",매크로:"MAINTAIN",섹터:"UNDERWEIGHT",사이클:"UNDERWEIGHT",크립토:"MAINTAIN",가치투자자:"MAINTAIN"}},
  {date:"2026-04-06",consensus:"strong_consensus",confidence:75,changes:2,risks:2,summary:"전반적 비중 유지, 삼성전자 소폭 확대",stances:{퀀트:"MAINTAIN",매크로:"OVERWEIGHT",섹터:"MAINTAIN",사이클:"OVERWEIGHT",크립토:"MAINTAIN",가치투자자:"OVERWEIGHT"}},
  {date:"2026-03-30",consensus:"split_decision",confidence:52,changes:4,risks:4,summary:"의견 분열 — 기술주 비중 놓고 대립, 현상 유지 권고",stances:{퀀트:"OVERWEIGHT",매크로:"UNDERWEIGHT",섹터:"MAINTAIN",사이클:"UNDERWEIGHT",크립토:"OVERWEIGHT",가치투자자:"UNDERWEIGHT"}},
  {date:"2026-03-23",consensus:"majority_view",confidence:72,changes:2,risks:1,summary:"금리 인하 수혜 기대, TLT 비중 확대 권고",stances:{퀀트:"OVERWEIGHT",매크로:"OVERWEIGHT",섹터:"MAINTAIN",사이클:"OVERWEIGHT",크립토:"MAINTAIN",가치투자자:"OVERWEIGHT"}},
];

async function loadData(){
  let history = [...DEMO_HISTORY];

  // 1) history_index.json에서 실제 히스토리 로드 시도
  try{
    const ri=await fetch('./data/history_index.json?t='+Date.now());
    if(ri.ok){
      const idx=await ri.json();
      if(idx.reports && idx.reports.length>0){
        history=idx.reports; // 실제 데이터가 있으면 데모 대체
      }
    }
  }catch(e){}

  // 2) latest_analysis.json에서 최신 결과 추가
  try{
    const r=await fetch('./data/latest_analysis.json?t='+Date.now());
    if(r.ok){
      const data=await r.json();
      const v=data.verdict||{};
      const existing=history.find(h=>h.date===data.date);
      if(!existing){
        history.unshift({
          date:data.date,
          consensus:v.consensus_type||"unknown",
          confidence:v.confidence_score||0,
          changes:(v.portfolio_changes||[]).length,
          risks:(v.risk_warnings||[]).length,
          summary:v.summary||"",
          stances:v.stance_votes||{},
        });
      }
    }
  }catch(e){}
  return history.sort((a,b)=>b.date.localeCompare(a.date));
}

function consensusBadge(type){
  const map={strong_consensus:['Strong','badge-sc'],majority_view:['Majority','badge-mv'],split_decision:['Split','badge-sd'],no_consensus:['None','badge-nc']};
  const[label,cls]=map[type]||['?','badge-nc'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function confColor(s){return s>=70?'#22c55e':s>=50?'#eab308':'#ef4444';}

function stanceIcon(s){
  return{STRONG_OVERWEIGHT:'🟢🟢',OVERWEIGHT:'🟢',MAINTAIN:'🟡',UNDERWEIGHT:'🔴',STRONG_UNDERWEIGHT:'🔴🔴'}[s]||'⚪';
}

function render(history){
  // 차트
  if(history.length>1){
    new Chart(document.getElementById('confidenceChart'),{
      type:'line',
      data:{
        labels:history.map(h=>h.date).reverse(),
        datasets:[{
          label:'확신도 (%)',
          data:history.map(h=>h.confidence).reverse(),
          borderColor:'#6366f1',
          backgroundColor:'#6366f122',
          fill:true,
          tension:0.3,
          pointRadius:5,
          pointBackgroundColor:history.map(h=>confColor(h.confidence)).reverse(),
        }]
      },
      options:{
        responsive:true,
        scales:{
          y:{beginAtZero:true,max:100,ticks:{color:'#94a3b8'},grid:{color:'#2a2d3e'}},
          x:{ticks:{color:'#94a3b8'},grid:{color:'#2a2d3e'}}
        },
        plugins:{legend:{labels:{color:'#94a3b8'}}}
      }
    });
  }

  // 테이블
  let html=`<table>
    <thead><tr><th>날짜</th><th>합의</th><th>확신도</th><th>변경</th><th>리스크</th><th>에이전트 투표</th><th>요약</th></tr></thead>
    <tbody>`;
  for(const h of history){
    const stanceIcons=Object.entries(h.stances||{}).map(([name,s])=>`<span title="${name}: ${s}">${stanceIcon(s)}</span>`).join(' ');
    html+=`<tr>
      <td style="font-weight:600;white-space:nowrap">${h.date}</td>
      <td>${consensusBadge(h.consensus)}</td>
      <td><span style="color:${confColor(h.confidence)};font-weight:600">${h.confidence}%</span>
        <span class="conf-mini"><span class="conf-mini-fill" style="width:${h.confidence}%;background:${confColor(h.confidence)}"></span></span></td>
      <td class="changes-count">${h.changes}</td>
      <td class="${h.risks>=3?'negative':h.risks>=2?'neutral':'positive'}">${h.risks}</td>
      <td style="font-size:0.8rem">${stanceIcons}</td>
      <td style="font-size:0.8rem;color:#94a3b8;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${h.summary}">${h.summary.slice(0,80)}${h.summary.length>80?'...':''}</td>
    </tr>`;
  }
  html+=`</tbody></table>`;
  document.getElementById('historyTable').innerHTML=html;
}

loadData().then(render);
</script>
</body>
</html>
