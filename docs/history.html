<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History | Portfolio Council AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f8f9fb;color:#1e293b;font-size:14px;line-height:1.6}
.nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.nav-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#4f6ef7,#a855f7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:#64748b;text-decoration:none;transition:all 0.15s}
.nav-links a:hover,.nav-links a.active{background:#f1f5f9;color:#4f6ef7}
.container{max-width:1100px;margin:0 auto;padding:20px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;margin-bottom:16px}
.card-hdr{font-size:15px;font-weight:600;color:#334155;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:600;border-bottom:2px solid #f1f5f9}
td{padding:10px 12px;border-bottom:1px solid #f8f9fb;font-size:13px}
tr:hover{background:#fafbfd}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#ecfdf5;color:#059669}.badge-yellow{background:#fffbeb;color:#d97706}.badge-orange{background:#fff7ed;color:#ea580c}.badge-red{background:#fef2f2;color:#dc2626}
.conf-bar{display:inline-block;width:40px;height:5px;background:#f1f5f9;border-radius:3px;vertical-align:middle;margin-left:4px;overflow:hidden}
.conf-fill{display:block;height:100%;border-radius:3px}
.green{color:#059669}.red{color:#dc2626}.yellow{color:#d97706}.dim{color:#94a3b8}
.stance-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:2px}
</style>
</head>
<body>
<div class="nav"><div class="nav-brand"><div class="nav-icon">P</div> Portfolio Council AI</div><div class="nav-links"><a href="index.html">Dashboard</a><a href="portfolio-editor.html">Editor</a><a href="history.html" class="active">History</a><a href="accuracy.html">Accuracy</a></div></div>
<div class="container">
<div class="card"><div class="card-hdr">📈 Confidence Trend</div><canvas id="chart" height="100"></canvas></div>
<div class="card"><div class="card-hdr">📅 Analysis History</div><div id="tbl"></div></div>
</div>
<script>
const DEMO=[{date:"2026-04-13",consensus:"majority_view",confidence:68,changes:3,risks:3,summary:"NVDA 축소, 현금 확대, 방어 섹터 추가",stances:{퀀트:"UNDERWEIGHT",매크로:"MAINTAIN",섹터:"UNDERWEIGHT",사이클:"UNDERWEIGHT",크립토:"MAINTAIN",가치투자자:"MAINTAIN"}},{date:"2026-04-06",consensus:"strong_consensus",confidence:75,changes:2,risks:2,summary:"비중 유지, 삼성전자 확대",stances:{퀀트:"MAINTAIN",매크로:"OVERWEIGHT",섹터:"MAINTAIN",사이클:"OVERWEIGHT",크립토:"MAINTAIN",가치투자자:"OVERWEIGHT"}},{date:"2026-03-30",consensus:"split_decision",confidence:52,changes:4,risks:4,summary:"의견 분열, 현상 유지",stances:{퀀트:"OVERWEIGHT",매크로:"UNDERWEIGHT",섹터:"MAINTAIN",사이클:"UNDERWEIGHT",크립토:"OVERWEIGHT",가치투자자:"UNDERWEIGHT"}},{date:"2026-03-23",consensus:"majority_view",confidence:72,changes:2,risks:1,summary:"금리 인하 수혜, TLT 확대",stances:{퀀트:"OVERWEIGHT",매크로:"OVERWEIGHT",섹터:"MAINTAIN",사이클:"OVERWEIGHT",크립토:"MAINTAIN",가치투자자:"OVERWEIGHT"}}];
async function load(){let h=[...DEMO];try{const r=await fetch('./data/history_index.json?t='+Date.now());if(r.ok){const d=await r.json();if(d.reports&&d.reports.length)h=d.reports;}}catch(e){}try{const r=await fetch('./data/latest_analysis.json?t='+Date.now());if(r.ok){const d=await r.json();const v=d.verdict||{};if(!h.find(x=>x.date===d.date))h.unshift({date:d.date,consensus:v.consensus_type,confidence:v.confidence_score||0,changes:(v.portfolio_changes||[]).length,risks:(v.risk_warnings||[]).length,summary:v.summary||"",stances:v.stance_votes||{}});}}catch(e){}return h.sort((a,b)=>b.date.localeCompare(a.date));}
function cBadge(t){const m={strong_consensus:['Strong','badge-green'],majority_view:['Majority','badge-yellow'],split_decision:['Split','badge-orange'],no_consensus:['None','badge-red']};const[l,c]=m[t]||['?','badge-red'];return`<span class="badge ${c}">${l}</span>`;}
function cCol(s){return s>=70?'#059669':s>=50?'#d97706':'#dc2626';}
function sDot(s){return`<span class="stance-dot" style="background:${s.includes('OVER')?'#059669':s==='MAINTAIN'?'#d97706':'#dc2626'}" title="${s}"></span>`;}
function render(data){
  if(data.length>1){new Chart(document.getElementById('chart'),{type:'line',data:{labels:data.map(h=>h.date).reverse(),datasets:[{label:'Confidence %',data:data.map(h=>h.confidence).reverse(),borderColor:'#4f6ef7',backgroundColor:'#4f6ef722',fill:true,tension:0.3,pointRadius:5,pointBackgroundColor:data.map(h=>cCol(h.confidence)).reverse()}]},options:{responsive:true,scales:{y:{beginAtZero:true,max:100,ticks:{font:{family:'Inter'}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{family:'Inter'}},grid:{color:'#f1f5f9'}}},plugins:{legend:{labels:{font:{family:'Inter'}}}}}});}
  let html='<table><thead><tr><th>Date</th><th>Consensus</th><th>Confidence</th><th>Changes</th><th>Risks</th><th>Agents</th><th>Summary</th></tr></thead><tbody>';
  for(const r of data){const dots=Object.entries(r.stances||{}).map(([n,s])=>sDot(s)).join('');html+=`<tr><td style="font-weight:600">${r.date}</td><td>${cBadge(r.consensus)}</td><td><span style="color:${cCol(r.confidence)};font-weight:600">${r.confidence}%</span><span class="conf-bar"><span class="conf-fill" style="width:${r.confidence}%;background:${cCol(r.confidence)}"></span></span></td><td>${r.changes}</td><td class="${r.risks>=3?'red':'yellow'}">${r.risks}</td><td>${dots}</td><td class="dim" style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.summary}">${r.summary}</td></tr>`;}
  html+='</tbody></table>';document.getElementById('tbl').innerHTML=html;
}
load().then(render);
</script>
</body>
</html>
