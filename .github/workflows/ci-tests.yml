name: CI Tests

on:
  push:
    paths: ['src/**', 'tests/**', 'pyproject.toml']
  pull_request:
    paths: ['src/**', 'tests/**', 'pyproject.toml']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run syntax check
        run: |
          python -c "
          import ast; from pathlib import Path
          for f in sorted(Path('src').rglob('*.py')):
              ast.parse(f.read_text())
          print('✅ Syntax check passed')
          "

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests (no API)
        run: pytest tests/integration/ -v --tb=short -k "not api"

      - name: Check import chain
        run: |
          python -c "
          from src.core.schemas import Portfolio, AgentReport, DebateResult, Verdict
          from src.core.consensus import weighted_vote, rule_based_verdict
          from src.infrastructure.llm.base import LLMProvider
          from src.infrastructure.storage.json_storage import JSONFileStorage
          from src.utils.rate_limiter import RateLimiter, RateLimiterRegistry
          print('✅ Import chain verified')
          "
